<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Text Summarization</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   
  </head>
  <body>
    <div class="main-container">
      <div class="header">
        <h1>Smart Text Summarization</h1>
       
      </div>

      <div class="card">
        <form method="POST">
          <div class="form-header">
            <div class="form-group">
              <label for="language">Language (Auto)</label>
              <select id="language" name="language">
                <option value="auto">Auto</option>
                <option value="en">English</option>
              </select>
            </div>

            <button type="button" class="btn-reset" title="Clear text" onclick="resetForm()"> ↻ Reset</button>

            <div class="form-group">
              <label for="length">Summary Length</label>
              <select id="length" name="length" required>
                <option value="short">Short</option>
                <option value="medium">Medium</option>
                <option value="long">Long</option>
              </select>
            </div>

            <div class="toggle-group">
              <label class="toggle-label">Format</label>
              <div class="toggle-buttons">
                <button type="button" class="toggle-btn active" data-format="paragraph">¶ Paragraph</button>
                <!-- <button type="button" class="toggle-btn" data-format="bullets">• Bullet Points</button> -->
              </div>
            </div>
          </div>

          <div class="wrapper">
            <textarea id="text" name="text" placeholder="Enter or paste your text and press 'Summarize'" oninput="updateLength()" required>{{ submitted_text }}</textarea>
            <span id="count" class="counter">0</span>
          </div>

          <div class="button-group">
            <button type="button" class="btn-secondary" onclick="document.getElementById('fileInput').click()"><i class="fa-solid fa-cloud-arrow-up"></i> Upload</button>
            <button type="button" class="btn-secondary" onclick="pasteText()"><i class="fa-solid fa-paste"></i> Paste</button>
          </div>

          <button type="submit" class="btn-submit">Summarize</button>
        </form>

        {% if result %}
        <div class="result">
          <h2>Summary</h2>
          <p>{{ result.summary }}</p>
          <div class="metrics">
            <p>Summary Length: {{ result.summary_length }} words</p>
          </div>
        </div>
        {% endif %}
      </div>
    </div>

    <input type="file" id="fileInput" style="display: none;" accept=".txt" />
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  </body>
</html>
